name: Translate Documentation

on:
  workflow_dispatch:
    inputs:
      languages:
        description: 'Languages to translate (comma-separated, e.g., "es,fr,de" or "all")'
        required: false
        default: 'all'
      force:
        description: 'Force re-translation of all files'
        required: false
        default: 'false'
        type: boolean
      debug:
        description: 'Enable debug output'
        required: false
        default: 'false'
        type: boolean

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run translation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ vars.OPENAI_API_BASE || secrets.OPENAI_API_BASE || 'https://api.sdaiagent.com/v1' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL || 'superdav-chat-pro' }}
          LANGUAGES: ${{ inputs.languages }}
          FORCE: ${{ inputs.force }}
          DEBUG: ${{ inputs.debug }}
        run: |
          ARGS=()

          if [ "$LANGUAGES" != "all" ]; then
            ARGS+=(--locales "$LANGUAGES")
          fi

          if [ "$FORCE" == "true" ]; then
            ARGS+=(--force)
          fi

          if [ "$DEBUG" == "true" ]; then
            ARGS+=(--debug)
          fi

          node scripts/translate.js --concurrency 2 --commit "${ARGS[@]}"

      - name: Push translations
        if: always() && !cancelled()
        run: git push
